org.gradle.jvmargs=-Xmx4G -XX:MaxMetaspaceSize=2G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8
android.useAndroidX=true
gradle.user.home=G:/.gradle
kotlin.incremental=false
kotlin.incremental.android=false

# Optimize Gradle performance - conservative settings for stability
org.gradle.parallel=false
org.gradle.caching=false
org.gradle.configureondemand=false
org.gradle.daemon=true
org.gradle.workers.max=1

# Disable R8 code shrinking to speed up build
android.enableR8.fullMode=false
android.enableR8=false
android.enableJetifier=true

# AAPT2 configuration - let Gradle download from Maven
android.enableR8.fullMode=false
android.enableJetifier=true

# Reduce resource processing overhead
android.nonTransitiveRClass=false
android.nonFinalResIds=false